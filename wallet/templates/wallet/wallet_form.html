{% extends 'wallet/base.html' %}

{% block content %}

<div class="card">
    <h2><i class="fa-solid fa-wallet"></i> Configuración de Wallet</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">
                <label>Estado</label>
                {{ form.is_active }}
            </div>

        </div>

        <div class="form-actions">
            <a class="btn btn-danger" href="{% url 'transaction_list' %}">Cancelar</a>
            <button class="btn btn-success" type="submit">
                Guardar
            </button>
        </div>

    </form>
</div>

{% endblock %}
