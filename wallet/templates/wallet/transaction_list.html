<!DOCTYPE html>
<html>

<head>
    <title>Transacciones</title>
</head>

<body>
    <h1>Listado de Transacciones</h1>

    <a href="{% url 'transaction_create' %}">Crear nueva transacción</a>

    <ul>
        {% for tx in transactions %}
        <li>
            {{ tx.timestamp }} |
            {{ tx.transaction_type.name }} |
            ${{ tx.amount }}

            <a href="{% url 'transaction_detail' tx.id %}">Ver</a>
            <a href="{% url 'transaction_update' tx.id %}">Editar</a>
            <a href="{% url 'transaction_delete' tx.id %}">Eliminar</a>
        </li>
        {% empty %}
        <li>No hay transacciones</li>
        {% endfor %}
    </ul>

</body>

</html>
