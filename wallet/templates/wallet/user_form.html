{% extends 'wallet/base.html' %}

{% block content %}

<div class="card">
    <h2><i class="fa-solid fa-user"></i> Editar Usuario</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">
                <label>Usuario</label>
                {{ form.username }}
            </div>

            <div class="form-group">
                <label>Nombre</label>
                {{ form.first_name }}
            </div>

            <div class="form-group">
                <label>Apellido</label>
                {{ form.last_name }}
            </div>

            <div class="form-group">
                <label>Email</label>
                {{ form.email }}
            </div>

        </div>

        <div class="form-actions">
            <a class="btn btn-danger" href="{% url 'transaction_list' %}">Cancelar</a>
            <button class="btn btn-success" type="submit">Guardar</button>
        </div>
    </form>

    <hr style="margin:20px 0;">

    <a class="btn btn-primary" href="{% url 'password_change' %}">
        🔐 Cambiar contraseña
    </a>
</div>

{% endblock %}
