<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>E-Wallet</title>

    {% load static %}
    <link rel="stylesheet" href="{% static 'wallet/styles.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

    <div class="navbar">
        <div><strong>E-Wallet</strong></div>
        <div>
            {% if user.is_authenticated %}
                <span><i class="fa-solid fa-user"></i> 
                    {{ request.user.get_full_name_display }}</span>

                <form action="{% url 'logout' %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button class="btn btn-danger" type="submit">
                        <i class="fa-solid fa-right-from-bracket"></i> Salir
                    </button>
                </form>
            {% else %}
                <a class="btn btn-primary" href="{% url 'login' %}">
                    <i class="fa-solid fa-right-to-bracket"></i> Login
                </a>
            {% endif %}
        </div>
    </div>

    <div class="container fade-in">
        {% block content %}
        {% endblock %}
    </div>

    <script>
    document.addEventListener("DOMContentLoaded", function () {

        const checkbox = document.querySelector(".switch input");
        const statusText = document.getElementById("wallet-status-text");

        if (checkbox && statusText) {
            checkbox.addEventListener("change", function () {
                if (checkbox.checked) {
                    statusText.textContent = "🟢 Activa";
                } else {
                    statusText.textContent = "🔴 Inactiva";
                }
            });
        }
    });

    const modal = document.getElementById("modal");
    const modalText = document.getElementById("modal-text");
    const reverseBtn = document.getElementById("reverse-btn");

    document.querySelectorAll(".open-modal").forEach(btn => {
        btn.addEventListener("click", function () {

            const id = this.dataset.id;
            const type = this.dataset.type;

            const reverseType = type === "deposito" ? "retiro" : "depósito";

            modalText.innerHTML = `
                No es posible eliminar transacciones.<br><br>
                Puedes generar una transacción de <strong>${reverseType}</strong>
                por el mismo monto para revertir este movimiento.
            `;

            reverseBtn.href = `/transactions/${id}/reverse/`;

            modal.style.display = "flex";

            // 🔒 BLOQUEAR SCROLL
            document.body.style.overflow = "hidden";

            // 🎯 FOCO AL BOTÓN PRINCIPAL
            reverseBtn.focus();
        });
    });

    function closeModal() {
        modal.style.display = "none";

        // 🔓 RESTAURAR SCROLL
        document.body.style.overflow = "auto";
    }

    // 🚫 EVITAR CLIC FUERA DEL MODAL
    modal.addEventListener("click", function (e) {
        if (e.target === modal) {
            // no hacer nada → bloquea cierre externo
        }
    });

    // ⌨️ ESC opcional (puedes dejarlo o no)
    document.addEventListener("keydown", function(e){
        if (e.key === "Escape" && modal.style.display === "flex") {
            closeModal();
        }
    });
    </script>
</body>
</html>
