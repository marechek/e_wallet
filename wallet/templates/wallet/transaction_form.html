{% extends 'wallet/base.html' %}
{% load clp_filters %}

{% block content %}

<div class="card">
    <h2><i class="fa-solid fa-plus"></i> Nueva Transacción</h2>

    <form method="post">
        {% csrf_token %}

        <div class="form-grid">

            <div class="form-group">
                <label><i class="fa-solid fa-wallet"></i> Wallet</label>
                {{ form.wallet }}
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-tag"></i> Tipo</label>
                {{ form.transaction_type }}
            </div>

            <div class="form-group">
                <label><i class="fa-solid fa-dollar-sign"></i> Monto</label>
                {{ form.amount }}
            </div>

            <div class="form-group full">
                <label><i class="fa-solid fa-pen"></i> Descripción</label>
                {{ form.description }}
            </div>

        </div>

        <div class="form-actions">
            <a class="btn btn-danger" href="{% url 'transaction_list' %}">
                Cancelar
            </a>
            <button class="btn btn-primary" type="submit">
                <i class="fa-solid fa-floppy-disk"></i> Guardar
            </button>
        </div>

    </form>
</div>

{% endblock %}
